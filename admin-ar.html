<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المسؤول | Cyberixa</title>
    <!-- Alexandria Font for Arabic -->
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Alexandria', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Header Styles */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-left img {
            height: 40px;
        }
        .header-left h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #004e92;
        }
        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; vertical-align: middle; }
        th { background-color: #f8f9fa; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; transition: 0.2s; text-decoration: none; display: inline-block; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-primary { background: #004e92; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-outline { background: white; border: 1px solid #004e92; color: #004e92; }
        .btn:hover { opacity: 0.9; }
        
        /* Form Styles */
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .input-group { display: flex; flex: 1; gap: 5px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; }
        
        /* Login Modal */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:100; }
        .login-box { background: white; padding: 40px; border-radius: 10px; text-align: center; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-box img { margin-bottom: 20px; }
        .login-box h2 { margin: 0 0 10px 0; color: #333; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginOverlay">
        <div class="login-box">
            <img src="images/logo.png" alt="Cyberixa Logo" style="height: 50px;" onerror="this.style.display='none'">
            <h2>تسجيل دخول المسؤول</h2>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">أدخل كلمة مرور المسؤول</p>
            <input type="password" id="passwordInput" placeholder="كلمة المرور" style="width: 100%; margin-bottom: 10px;" onkeydown="if(event.key==='Enter') login()">
            <button onclick="login()" class="btn btn-primary" style="width: 100%;">دخول</button>
            <p id="loginError" style="color:red; font-size:0.8rem; margin-top:10px; display:none;">كلمة المرور غير صحيحة</p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="container hidden">
        
        <!-- Header with Logo -->
        <div class="page-header">
            <div class="header-left">
                <img src="images/logo.png" alt="Cyberixa" onerror="this.style.display='none'">
                <h1>إدارة الشهادات</h1>
            </div>
            <div class="header-right">
                <a href="admin.html" class="btn btn-outline" title="Switch to English">EN</a>
                <button onclick="logout()" class="btn btn-danger" style="font-size: 0.8rem;"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </div>

        <!-- Add New Form -->
        <div style="background: #f9fbfd; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #e1e4e8;">
            <h3 style="margin-top:0;"><i class="fas fa-plus-circle" style="color: #004e92;"></i> إضافة طالب جديد</h3>
            
            <div class="form-row">
                <!-- ID Input with Generate Button -->
                <div class="input-group">
                    <input type="text" id="newId" placeholder="رقم الشهادة (مثال: CYB-2026-0001)">
                    <button onclick="generateId()" class="btn btn-outline" title="توليد تلقائي"><i class="fas fa-magic"></i></button>
                </div>
                <input type="text" id="newName" placeholder="اسم الطالب">
            </div>
            <div class="form-row">
                <input type="text" id="newCourse" placeholder="اسم الدورة">
                <input type="date" id="newDate">
            </div>
            <button onclick="addCertificate()" class="btn btn-success"><i class="fas fa-plus"></i> إضافة شهادة</button>
        </div>

        <!-- Table List -->
        <h3><i class="fas fa-list"></i> الشهادات المصدرة</h3>
        <table id="certTable">
            <thead>
                <tr>
                    <th>الرقم التعريفي</th>
                    <th>الاسم</th>
                    <th>الدورة</th>
                    <th>التاريخ</th>
                    <th style="width: 200px;">رابط التحقق</th>
                    <th style="width: 100px;">خيارات</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data loads here -->
            </tbody>
        </table>
    </div>

    <script>
        const API = '/api/manage';
        let token = ''; 

        // --- AUTH FUNCTIONS ---
        async function login() {
            token = document.getElementById('passwordInput').value;
            try {
                const res = await fetch(API, { headers: { 'Authorization': `Bearer ${token}` }});
                if (res.ok) {
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('dashboard').classList.remove('hidden');
                    generateId(); 
                    loadData();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (e) {
                alert("خطأ في الاتصال");
            }
        }

        function logout() {
            token = '';
            location.reload();
        }

        // --- ID GENERATOR ---
        function generateId() {
            const year = new Date().getFullYear();
            const randomNum = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            const newId = `CYB-${year}-${randomNum}`;
            document.getElementById('newId').value = newId;
        }

        // --- DATA FUNCTIONS ---
        async function loadData() {
            const res = await fetch(API, { headers: { 'Authorization': `Bearer ${token}` }});
            const data = await res.json();
            
            const tbody = document.querySelector('#certTable tbody');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">لا توجد شهادات.</td></tr>';
                return;
            }

            data.forEach(cert => {
                const tr = document.createElement('tr');
                const link = cert.link || `${window.location.origin}/verify.html?id=${cert.id}`;

                tr.innerHTML = `
                    <td><strong>${cert.id}</strong></td>
                    <td>${cert.name}</td>
                    <td>${cert.course}</td>
                    <td>${cert.date}</td>
                    <td>
                        <div style="display:flex; gap:5px; align-items:center;">
                            <input type="text" value="${link}" readonly style="font-size:0.7rem; padding:4px; width:100%; border:1px solid #eee; background:#f9f9f9; direction: ltr; text-align: right;">
                            <button onclick="copyLink('${link}')" class="btn btn-primary" style="padding:4px 8px; font-size:0.8rem; white-space:nowrap;"><i class="fas fa-copy"></i></button>
                        </div>
                    </td>
                    <td><button onclick="deleteCert('${cert.id}')" class="btn btn-danger" style="padding: 5px 10px; font-size: 0.8rem;"><i class="fas fa-trash"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function addCertificate() {
            const id = document.getElementById('newId').value.trim();
            const name = document.getElementById('newName').value.trim();
            const course = document.getElementById('newCourse').value.trim();
            const date = document.getElementById('newDate').value;

            if(!id || !name || !course) return alert("يرجى ملء الرقم، الاسم، والدورة");

            const res = await fetch(API, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ id, name, course, date })
            });

            if (res.ok) {
                alert("تمت إضافة الشهادة بنجاح!");
                loadData();
                generateId(); 
                document.getElementById('newName').value = '';
                document.getElementById('newCourse').value = '';
                document.getElementById('newDate').value = '';
            } else {
                alert("خطأ في إضافة الشهادة.");
            }
        }

        async function deleteCert(id) {
            if(!confirm("هل أنت متأكد من حذف الشهادة رقم " + id + "؟")) return;

            const res = await fetch(API, {
                method: 'DELETE',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ id })
            });

            if (res.ok) {
                loadData();
            } else {
                alert("خطأ في الحذف");
            }
        }

        function copyLink(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("تم نسخ الرابط!");
            }, (err) => {
                prompt("انسخ هذا الرابط:", text);
            });
        }
    </script>
</body>
</html>
